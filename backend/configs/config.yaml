# Voice2Claim Configuration
server:
  port: 8080
  host: 0.0.0.0

valsea:
  asr_endpoint: https://api.valsea.ai/v1/asr/transcribe
  semantic_endpoint: https://api.valsea.ai/v1/understand
  api_key: ${VALSEA_API_KEY}

llm:
  provider: openai
  api_key: ${LLM_API_KEY}
  model: gpt-4

mcp:
  mail:
    smtp_host: smtp.gmail.com
    smtp_port: 587
  phone:
    provider: twilio
  crm:
    endpoint: https://crm.example.com/api

logging:
  level: info
  format: json
