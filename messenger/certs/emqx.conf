node.name = emqx1@emqx1

listeners.tcp.default = 1883
listeners.ssl.default = 8883
listeners.ws.default = 8083
listeners.wss.default = 8084

listeners.ssl.default.ssl_options.keyfile     = /opt/emqx/certs/mqtt_private.key
listeners.ssl.default.ssl_options.certfile    = /opt/emqx/certs/mqtt_public.crt
listeners.ssl.default.ssl_options.cacertfile  = /opt/emqx/certs/mqtt_public.crt

listeners.wss.default.ssl_options.keyfile     = /opt/emqx/certs/mqtt_private.key
listeners.wss.default.ssl_options.certfile    = /opt/emqx/certs/mqtt_public.crt
listeners.wss.default.ssl_options.cacertfile  = /opt/emqx/certs/mqtt_public.crt