user nginx;
worker_processes auto;
worker_rlimit_nofile 65535; # Tăng giới hạn file descriptor cho worker

events {
    worker_connections 4096;  # Tăng từ 1024 lên 4096 để chịu tải WS tốt hơn
    multi_accept on;          # Chấp nhận nhiều connection cùng lúc
    use epoll;                # Tối ưu cho Linux
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    access_log off;    
    error_log  /var/log/nginx/error.log warn;

    # --- Performance & Security Basics ---
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    server_tokens   off;
    
    # Gzip compression (Giảm băng thông cho web voice)
    gzip on;
    gzip_vary on;
    gzip_min_length 1024; 
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript 
               text/xml application/xml application/xml+rss text/javascript 
               image/svg+xml application/wasm;

    # Resolver
    resolver 1.1.1.1 8.8.8.8 valid=30s ipv6=off;

    # --- Rate Limiting Zones ---
    limit_req_zone $binary_remote_addr zone=limitbyip:10m rate=10r/s;
    limit_conn_zone $binary_remote_addr zone=connlimitbyip:10m;
    limit_req_zone $binary_remote_addr zone=wslimit:10m rate=30r/s;

    # --- Global Proxy Settings ---
    proxy_connect_timeout 60s;
    proxy_send_timeout 3600s;
    proxy_read_timeout 3600s;
    proxy_request_buffering off;

    include /etc/nginx/conf.d/*.conf;
}
