server {
    listen 80;
    listen [::]:80;
    server_name domain .net www.voice2claim.net;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name voice2claim.net www.voice2claim.net;
    
   # access_log off;
access_log /var/log/nginx/access.log;
error_log  /var/log/nginx/error.log notice;
    http2 on;

    # SSL Certs (Đảm bảo đường dẫn này tồn tại trên máy svr)
    ssl_certificate     /etc/nginx/ssl/voice2claim.crt;
    ssl_certificate_key /etc/nginx/ssl/voice2claim.key;
    
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # --- SECURITY HEADERS (Chỉ giữ lại các header không xung đột với Go) ---
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(self), geolocation=()" always;

    # --- MAIN SITE & API ---
    location / {
        # Rate limit thô chống DDoS, để Go xử lý logic tinh tế hơn
        limit_req zone=limitbyip burst=50 nodelay;
        limit_conn connlimitbyip 100;

        proxy_pass http://voice2claim-service:8086;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffer_size 16k;
        proxy_buffers 4 64k;
        proxy_busy_buffers_size 128k;
    }

location = /mq {
    proxy_pass http://messenger:8083/mqtt;

    proxy_http_version 1.1;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;

    proxy_read_timeout 86400;
    proxy_send_timeout 86400;

    proxy_buffering off;
}
location /llmprox {
    proxy_pass http://llmprox-service:8085/;
    
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-User-ID $http_x_user_id;

    # Timeout dài cho cả chat và audio
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
    proxy_buffering off;
    proxy_cache off;
    
    # Quan trọng cho file upload (Voice2Text)
    client_max_body_size 50M;
}
location /voice2claim/v1/api/ {
    rewrite ^/voice2claim/v1/api/(.*)$ /api/$1 break;

    proxy_pass http://voice2claim-service:8086;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-User-ID $http_x_user_id;

    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
    proxy_buffering off;
    proxy_cache off;
    client_max_body_size 50M;
}
location /socket.io/ {
    proxy_pass http://host.docker.internal:5003;

    proxy_http_version 1.1;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "Upgrade";
    proxy_set_header Host $host;

    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;

    proxy_buffering off;
}
    # Error page
    error_page 404 /404.html;
    location = /404.html {
        root /etc/nginx/html;
        internal;
        add_header X-Content-Type-Options "nosniff" always;
    }
}
